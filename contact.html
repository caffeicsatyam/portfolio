<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | > satyamc</title>
  <meta name="description" content="Get in touch with Satyam Chaturvedi. Send a message through a secure terminal uplink.">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <!-- Navigation -->
  <header class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-brand">> satyamc</a>
      <nav>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">root</a></li>
          <li><a href="projects.html">projects</a></li>
          <li><a href="links.html">links</a></li>
          <li><a href="contact.html" class="active">contact</a></li>
        </ul>
      </nav>
      <button class="nav-mobile-toggle" id="navToggle" aria-label="Menu">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </header>

  <!-- Contact Section -->
  <main>
    <div class="container">
      <div class="contact-section">
        <div class="contact-header">
          <h1>CONNECT_USER</h1>
          <p class="contact-meta">LOCATION: 127.0.0.1 // PORT: 8080</p>
          <p class="contact-meta" style="margin-top: 8px;">EMAIL: <a href="mailto:satyamchaturvedibbk@gmail.com" style="color: inherit; text-decoration: underline;">satyamchaturvedibbk@gmail.com</a></p>
          <div class="contact-status">
            <div class="status-item">
              <span class="status-value">98.4%</span>
              <span class="status-label">Signal</span>
            </div>
            <div class="status-item">
              <span class="status-value">12MS</span>
              <span class="status-label">Latency</span>
            </div>
          </div>
          <div class="contact-logs">
            <p>> KERNEL: SECURE_SOCKET_OPEN</p>
            <p>> HANDSHAKE: COMPLETED</p>
            <p>> ENCRYPTION: AES-256_ACTIVE</p>
          </div>
        </div>

        <form class="contact-form" id="contactForm">
          <div class="form-group">
            <label for="userName">IDENTIFICATION</label>
            <input type="text" id="userName" name="name" placeholder="Enter your name..." required>
          </div>
          <div class="form-group">
            <label for="userEmail">COMM_CHANNEL</label>
            <input type="email" id="userEmail" name="email" placeholder="Enter your email..." required>
          </div>
          <div class="form-group">
            <label for="userSubject">SUBJECT_LINE</label>
            <input type="text" id="userSubject" name="subject" placeholder="Subject of transmission...">
          </div>
          <div class="form-group">
            <label for="userMessage">DATA_PACKET</label>
            <textarea id="userMessage" name="message" placeholder="Enter your message..." required></textarea>
          </div>
          <button type="submit" class="form-submit">
            <span class="material-symbols-outlined" style="font-size:18px;">send</span>
            TRANSMIT_DATA
          </button>
        </form>
      </div>
    </div>
  </main>



  <script src="src/main.js"></script>
</body>
</html>
